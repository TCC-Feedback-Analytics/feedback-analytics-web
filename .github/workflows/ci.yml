name: CI Pipeline - Web

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main, homolog]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: lint + typecheck + build.
  # O typecheck usa tsconfig.ci.json (exclui testes); o codigo de producao
  # compila limpo via `tsc --noEmit`.
  # ---------------------------------------------------------------------------
  quality:
    name: lint-typecheck-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # @feedback/lib-shared vive num repo PRIVADO. O GITHUB_TOKEN padrao so
      # enxerga este repo, entao usamos um PAT (secret CONTRACTS_TOKEN, read-only
      # em feedback-analytics-contracts) reescrevendo https para incluir o token.
      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Typecheck (sem testes)
        run: ./node_modules/.bin/tsc -p tsconfig.ci.json --noEmit

      - name: Build web
        run: npm run build

  # ---------------------------------------------------------------------------
  # Job 2: unit + integracao (vitest). 100% mockado, nenhum secret necessario.
  # O script "test" e `vitest` SEM `run` (modo watch); `-- run` o coloca em
  # modo CI-safe.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test -- run
