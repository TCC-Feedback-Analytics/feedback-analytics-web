name: Deploy Web (Vercel)

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: "Digite ok para confirmar deploy."
        required: true
        type: string

concurrency:
  group: deploy-web-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - name: Validação manual de requests
        run: |
          if [ "${{ github.ref_name }}" != "homolog" ] && [ "${{ github.ref_name }}" != "main" ]; then
            echo "Este workflow deve ser executado apenas nas branches main ou homolog"
            exit 1
          fi

          if [ "${{ github.event.inputs.confirm_deploy }}" != "ok" ]; then
            echo "Confirme o deploy informando ok"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Deploy preview (homolog)
        id: deploy-homolog
        if: github.ref_name == 'homolog'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes --token "$VERCEL_TOKEN" --local-config vercel.json)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy production (main)
        id: deploy-main
        if: github.ref_name == 'main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config vercel.json)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Atribuir alias fixo ao homolog
        if: github.ref_name == 'homolog'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel alias set ${{ steps.deploy-homolog.outputs.url }} feedback-analytics-web-homolog.vercel.app --token "$VERCEL_TOKEN"

      - name: Install Playwright browsers
        if: github.ref_name == 'homolog'
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (homolog)
        if: github.ref_name == 'homolog'
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://feedback-analytics-web-homolog.vercel.app
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_ENTERPRISE_ID: ${{ secrets.E2E_TEST_ENTERPRISE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Playwright report
        if: github.ref_name == 'homolog' && always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
