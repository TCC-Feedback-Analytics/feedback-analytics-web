name: E2E Gate (PR -> main)

# Gate de promocao para producao: a PR homolog -> main so passa se o e2e
# rodar verde contra o ambiente de HOMOLOG ja deployado (alias estavel).
#
# Pre-requisito de processo: o homolog precisa estar deployado com o codigo
# que sera promovido.

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e-main:
    name: e2e-main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Auth do contrato privado (@feedback/lib-shared)
        run: |
          git config --global --add url."https://x-access-token:${{ secrets.CONTRACTS_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.CONTRACTS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E contra o homolog
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://feedback-analytics-web-homolog.vercel.app
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_ENTERPRISE_ID: ${{ secrets.E2E_TEST_ENTERPRISE_ID }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-main-gate
          path: playwright-report/
          retention-days: 7
