name: E2E Gate (PR -> main)

# Gate de promocao para producao: a PR developer -> main so passa se o e2e
# rodar verde contra o ambiente de DEVELOPER ja deployado (alias estavel).
#
# Pre-requisito de processo: o developer precisa estar deployado com o codigo
# que sera promovido.

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e-main:
    name: e2e-main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E contra o developer
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://feedback-analytics-web-developer.vercel.app
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_ENTERPRISE_ID: ${{ secrets.E2E_TEST_ENTERPRISE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-main-gate
          path: playwright-report/
          retention-days: 7
